<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEOS Monitoring - Activity</title>
    <link href="./css/app.css" rel="stylesheet" />
    <script defer src="./js/api-client.js"></script>
    <script defer src="./js/activity.js"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div
      class="fixed inset-y-0 left-0 w-64 bg-gradient-to-b from-indigo-800 to-purple-900 text-white shadow-lg"
    >
      <div
        class="flex items-center justify-center h-16 bg-gradient-to-r from-indigo-900 to-purple-900"
      >
        <h1 class="text-xl font-bold">PEOS Monitor</h1>
      </div>
      <nav class="mt-8">
        <a
          href="dashboard.html"
          class="block px-6 py-3 text-white hover:bg-indigo-700"
          >Dashboard</a
        >
        <a href="activity.html" class="block px-6 py-3 text-white bg-indigo-700"
          >Activity</a
        >
        <a
          href="participant.html"
          class="block px-6 py-3 text-white hover:bg-indigo-700"
          >Participant</a
        >
        <a
          href="files-table.html"
          class="block px-6 py-3 text-white hover:bg-indigo-700"
          >Files</a
        >
        <a
          href="login.html"
          class="block px-6 py-3 text-white hover:bg-indigo-700 mt-8"
          >Logout</a
        >
      </nav>
    </div>
    <div class="ml-64 p-8">
      <section>
        <div class="mb-8">
          <h1 class="text-3xl font-bold text-gray-900">Activity Management</h1>
          <p class="text-gray-600 mt-2">Add and manage your activities here.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-medium text-gray-900 mb-4">
              Add New Activity
            </h3>
            <form id="activityForm" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700"
                  >Activity Name</label
                >
                <input
                  id="activityName"
                  type="text"
                  required
                  class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-500 focus:ring-indigo-500"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700"
                  >Venue</label
                >
                <input
                  id="activityVenue"
                  type="text"
                  required
                  class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-500 focus:ring-indigo-500"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700"
                  >Date</label
                >
                <input
                  id="activityDate"
                  type="date"
                  required
                  class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-500 focus:ring-indigo-500"
                />
              </div>
              <button
                type="submit"
                class="w-full inline-flex justify-center rounded-md bg-indigo-600 py-2 px-4 text-sm font-semibold text-white hover:bg-indigo-700"
              >
                Add Activity
              </button>
              <p id="activityStatus" class="text-sm text-green-600 hidden">
                Activity added!
              </p>
            </form>
          </div>

          <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-medium text-gray-900 mb-4">
              Saved Activities
            </h3>
            <div class="mb-4">
              <input
                id="activitySearch"
                type="text"
                placeholder="Search Activity, Venue, or Date"
                class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-500 focus:ring-indigo-500"
              />
            </div>
            <div id="activityList" class="space-y-3 max-h-80 overflow-auto">
              <p class="text-gray-500">No activities yet.</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
