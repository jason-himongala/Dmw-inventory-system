<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEOS Monitoring - Login</title>
    <link href="./css/app.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* Make background image fully fit screen and responsive */
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

        background: url("images/dmw.gov.png") no-repeat center center;
        background-size: cover; /* Fit screen without stretching */
      }
    </style>
  </head>
  <body>
    <!-- Login Box -->
    <div
      class="max-w-md w-full rounded-lg shadow-2xl p-8"
      style="background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px)"
    >
      <div class="text-center mb-8">
        <div
          class="mx-auto w-16 h-16 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full flex items-center justify-center mb-4"
        >
          <img
            src="images/OIP.jpg"
            alt="Logo"
            class="w-10 h-10 object-contain rounded-full"
          />
        </div>
        <h1 class="text-2xl font-bold text-gray-900">PEOS Monitoring System</h1>
        <p class="text-gray-600 mt-2">Staff Login</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700"
            >Username</label
          >
          <input
            type="text"
            id="username"
            name="username"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <button
          type="submit"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Sign In
        </button>
      </form>

      <div id="error" class="mt-4 text-red-600 text-sm text-center hidden">
        Invalid credentials
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          // Simple demo auth (replace with real auth)
          if (username === "staff" && password === "password") {
            localStorage.setItem("loggedIn", "true");
            window.location.href = "dashboard.html";
          } else {
            document.getElementById("error").classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
