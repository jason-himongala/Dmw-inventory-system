<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEOS Monitoring - Login</title>
    <link href="./css/app.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* Make background image fully fit screen and responsive */
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #20294b 0%, #151d37 100%);
      }

      .login-card {
        animation: loginCardIn 0.75s ease-out both;
      }

      .login-logo {
        animation: loginLogoPop 0.8s ease-out 0.2s both;
      }

      .password-wrapper {
        position: relative;
      }

      .password-input {
        padding-right: 2.75rem;
      }

      .password-toggle {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #4b5563;
        cursor: pointer;
        padding: 0;
        line-height: 0;
      }

      .password-toggle:hover {
        color: #111827;
      }

      .password-toggle:focus-visible {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
        border-radius: 4px;
      }

      .hidden-icon {
        display: none;
      }

      /* Hide native password reveal/clear controls so only custom icon is visible */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none;
      }

      @keyframes loginCardIn {
        from {
          opacity: 0;
          transform: translateY(22px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes loginLogoPop {
        0% {
          opacity: 0;
          transform: scale(0.9);
        }
        60% {
          opacity: 1;
          transform: scale(1.05);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <!-- Login Box -->
    <div
      class="login-card max-w-md w-full rounded-lg shadow-2xl p-8"
      style="background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px)"
    >
      <div class="text-center mb-8">
        <div
          class="login-logo mx-auto w-16 h-16 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full flex items-center justify-center mb-4"
        >
          <img
            src="images/OIP.jpg"
            alt="Logo"
            class="w-10 h-10 object-contain rounded-full"
          />
        </div>
        <h1 class="text-2xl font-bold text-gray-900">PEOS Monitoring System</h1>
        <p class="text-gray-600 mt-2">Staff Login</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700"
            >Username</label
          >
          <input
            type="text"
            id="username"
            name="username"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          <div class="password-wrapper mt-1">
            <input
              type="password"
              id="password"
              name="password"
              required
              class="password-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            />
            <button
              type="button"
              id="togglePassword"
              class="password-toggle"
              aria-label="Show password"
              aria-pressed="false"
            >
              <svg
                id="eyeOpenIcon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg
                id="eyeClosedIcon"
                class="hidden-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M17.94 17.94A10.86 10.86 0 0 1 12 20c-7 0-11-8-11-8a21.82 21.82 0 0 1 5.17-6.88"
                ></path>
                <path d="M1 1l22 22"></path>
                <path
                  d="M9.53 9.53A3.5 3.5 0 0 0 12 15.5a3.44 3.44 0 0 0 2.47-.97"
                ></path>
                <path
                  d="M14.47 14.47A3.5 3.5 0 0 0 9.53 9.53M4.22 4.22A10.83 10.83 0 0 1 12 4c7 0 11 8 11 8a21.66 21.66 0 0 1-4.22 5.78"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Sign In
        </button>
      </form>

      <div id="error" class="mt-4 text-red-600 text-sm text-center hidden">
        Invalid credentials
      </div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const togglePasswordButton = document.getElementById("togglePassword");
      const eyeOpenIcon = document.getElementById("eyeOpenIcon");
      const eyeClosedIcon = document.getElementById("eyeClosedIcon");

      togglePasswordButton.addEventListener("click", function () {
        const isPasswordHidden = passwordInput.type === "password";

        passwordInput.type = isPasswordHidden ? "text" : "password";
        togglePasswordButton.setAttribute(
          "aria-label",
          isPasswordHidden ? "Hide password" : "Show password",
        );
        togglePasswordButton.setAttribute(
          "aria-pressed",
          isPasswordHidden ? "true" : "false",
        );
        eyeOpenIcon.classList.toggle("hidden-icon", isPasswordHidden);
        eyeClosedIcon.classList.toggle("hidden-icon", !isPasswordHidden);
      });

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          // Simple demo auth (replace with real auth)
          if (username === "staff" && password === "password") {
            localStorage.setItem("loggedIn", "true");
            window.location.href = "dashboard.html";
          } else {
            document.getElementById("error").classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
